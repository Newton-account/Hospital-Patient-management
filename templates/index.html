<!DOCTYPE html>
<html>
<head>
    <title>Hospital Management System</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f4f4f4; }

        .box {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        input {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px 12px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>🏥 Hospital Management System</h1>

<div class="box">
    <h2>Add Patient</h2>

    <input id="nrc" placeholder="NRC">
    <input id="name" placeholder="Name">
    <input id="severity" placeholder="Severity (1-5)">
    <input id="waiting_time" placeholder="Waiting Time">

    <button onclick="addPatient()">Save</button>
</div>

<div class="box">
    <h2>Load Patients</h2>
    <button onclick="loadPatients()">Refresh</button>
    <pre id="output"></pre>
</div>

<script>
function addPatient() {
    fetch("/patients", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            nrc: document.getElementById("nrc").value,
            name: document.getElementById("name").value,
            severity: document.getElementById("severity").value,
            waiting_time: document.getElementById("waiting_time").value
        })
    }).then(res => res.json())
      .then(data => alert(data.message));
}

function loadPatients() {
    fetch("/patients")
    .then(res => res.json())
    .then(data => {
        document.getElementById("output").textContent =
            JSON.stringify(data, null, 2);
    });
}
</script>

</body>
</html>
