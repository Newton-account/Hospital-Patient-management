<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Patient</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f4f7fb;
        }
        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 700px;
            box-shadow: 0 0 10px rgba(0,0,0,0.08);
        }
        input, select, button {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 10px;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

    <h1>Edit Patient</h1>

    <form method="POST">
        <input type="text" name="name" value="{{ patient.name }}" required>
        <input type="number" name="age" value="{{ patient.age }}" required>

        <select name="gender" required>
            <option value="Male" {% if patient.gender == 'Male' %}selected{% endif %}>Male</option>
            <option value="Female" {% if patient.gender == 'Female' %}selected{% endif %}>Female</option>
            <option value="Other" {% if patient.gender == 'Other' %}selected{% endif %}>Other</option>
        </select>

        <input type="text" name="phone" value="{{ patient.phone }}" required>
        <input type="text" name="address" value="{{ patient.address }}" required>
        <input type="text" name="condition" value="{{ patient.condition }}" required>

        <select name="severity" required>
            <option value="1" {% if patient.severity == 1 %}selected{% endif %}>1 - Mild</option>
            <option value="2" {% if patient.severity == 2 %}selected{% endif %}>2 - Moderate</option>
            <option value="3" {% if patient.severity == 3 %}selected{% endif %}>3 - Serious</option>
            <option value="4" {% if patient.severity == 4 %}selected{% endif %}>4 - Critical</option>
            <option value="5" {% if patient.severity == 5 %}selected{% endif %}>5 - Emergency</option>
        </select>

        <select name="status" required>
            <option value="Waiting" {% if patient.status == 'Waiting' %}selected{% endif %}>Waiting</option>
            <option value="Admitted" {% if patient.status == 'Admitted' %}selected{% endif %}>Admitted</option>
            <option value="Discharged" {% if patient.status == 'Discharged' %}selected{% endif %}>Discharged</option>
        </select>

        <input type="text" name="bed_number" value="{{ patient.bed_number }}" placeholder="Bed Number (e.g. B01)">
        <select name="bed_status">
            <option value="Not Allocated" {% if patient.bed_status == 'Not Allocated' %}selected{% endif %}>Not Allocated</option>
            <option value="Allocated" {% if patient.bed_status == 'Allocated' %}selected{% endif %}>Allocated</option>
            <option value="Released" {% if patient.bed_status == 'Released' %}selected{% endif %}>Released</option>
        </select>

        <button type="submit">Update Patient</button>
    </form>

</body>
</html>
